<style>
:root{
  --bg:#f3f4f6;--panel:#fff;--text:#111827;--muted:#6b7280;
  --green:#166534;--green2:#22c55e;--line:#d1d5db;--warning:#9a3412;
}
body.dark{
  --bg:#020617;--panel:#0f172a;--text:#f8fafc;--muted:#94a3b8;
  --green:#4ade80;--green2:#22c55e;--line:#334155;--warning:#fdba74;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
main{max-width:760px;margin:auto;padding:12px 12px 34px}
.top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
h1{font-size:29px;margin:3px 0}
.icon-btn{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:14px;padding:10px 12px;font-size:20px}
.searchbox{position:sticky;top:0;z-index:10;background:var(--bg);padding:6px 0 10px}
.input-row{display:grid;grid-template-columns:1fr auto;gap:8px}
input{width:100%;font-size:24px;padding:17px 16px;border:3px solid #2563eb;border-radius:18px;background:var(--panel);color:var(--text);outline:none}
.mic{min-width:58px;border:none;border-radius:18px;background:#2563eb;color:white;font-size:25px}
.help{text-align:center;color:var(--muted);font-size:13px;margin:8px 4px 0}
.hero{background:var(--panel);border-radius:24px;border-left:10px solid var(--green2);padding:18px;margin-top:12px;box-shadow:0 5px 18px rgba(0,0,0,.12)}
.hero-bac{font-size:88px;line-height:.95;font-weight:950;color:var(--green);letter-spacing:-4px}
.hero-company{font-size:27px;font-weight:850;margin-top:12px}
.hero-location{font-size:21px;color:var(--muted);margin-top:5px}
.hero-actions{display:flex;gap:8px;margin-top:15px;flex-wrap:wrap}
.action{border:1px solid var(--line);background:var(--bg);color:var(--text);border-radius:12px;padding:10px 12px;font-weight:700}
.notice{background:#fff7ed;color:#9a3412;border:1px solid #fdba74;border-radius:14px;padding:12px;margin:12px 0}
body.dark .notice{background:#431407;color:#fed7aa;border-color:#9a3412}
.list-title{font-size:15px;color:var(--muted);margin:16px 2px 7px}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.chip{white-space:nowrap;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:999px;padding:9px 12px;font-weight:650}
.card{background:var(--panel);border-radius:17px;margin:9px 0;padding:13px;border-left:7px solid var(--green2);box-shadow:0 2px 10px rgba(0,0,0,.08)}
.card .bac{font-size:40px;font-weight:950;color:var(--green)}
.card .company{font-size:20px;font-weight:800;margin-top:6px}
.card .location{font-size:17px;color:var(--muted);margin-top:3px}
.empty{text-align:center;color:var(--muted);font-size:18px;padding:42px 10px}
.small{font-size:13px;color:var(--muted)}
.hidden{display:none!important}
</style>
</head>

function distance(a,b){
  if(a===b)return 0;
  if(!a.length)return b.length;
  if(!b.length)return a.length;
  const prev=Array.from({length:b.length+1},(_,i)=>i);
  for(let i=1;i<=a.length;i++){
    let left=i,diag=i-1;
    for(let j=1;j<=b.length;j++){
      const up=prev[j],cost=a[i-1]===b[j-1]?0:1;
      const val=Math.min(up+1,left+1,diag+cost);
      diag=up;prev[j]=val;left=val;
    }
  }
  return prev[b.length];
}

function fuzzyWord(word,textWords){
  if(textWords.includes(word))return 1;
  if(word.length<4)return 0;
  let best=0;
  for(const t of textWords){
    if(t.startsWith(word)||word.startsWith(t))best=Math.max(best,.9);
    const maxLen=Math.max(word.length,t.length);
    const d=distance(word,t);
    const sim=1-d/maxLen;
    if(sim>best)best=sim;
  }
  return best;
}

for(const x of DATA){
  x._full=norm(`${x.company} ${x.location} ${x.aliases||""}`);
  x._words=x._full.split(" ");
}

function toggleFavorite(item){

  if(pos>=0)favorites.splice(pos,1);
  else favorites.unshift({key,bac:item.bac,company:item.company,location:item.location});
  favorites=favorites.slice(0,12);
  localStorage.setItem("dispatchFavorites",JSON.stringify(favorites));

}

function renderChips(){

  favoritesEl.innerHTML=favorites.map(x=>`<button class="chip" data-query="${escapeHtml(x.company+" "+x.location)}">${escapeHtml(x.bac+" Â· "+x.company)}</button>`).join("");
  document.querySelectorAll("[data-query]").forEach(btn=>btn.onclick=()=>{

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function scoreItem(item,words,whole){
  const company=norm(item.company),location=norm(item.location);
  let score=0;
  if(item._full===whole)score+=2000;
  if(company===whole)score+=1300;
  if(location===whole)score+=900;
  if(item._full.includes(whole))score+=500;
  if(company.startsWith(whole))score+=400;
  for(const w of words){
    const sim=fuzzyWord(w,item._words);
    score+=Math.round(sim*180);
    if(company.includes(w))score+=110;
    if(location.includes(w))score+=80;
  }
  return score;
}

function searchItems(value){
  const whole=norm(value);
  if(!whole)return [];
  const words=whole.split(" ").filter(Boolean);
  const ranked=[];
  for(const item of DATA){
    let minSim=1;
    for(const w of words)minSim=Math.min(minSim,fuzzyWord(w,item._words));
    if(minSim>=.58 || item._full.includes(whole)){
      ranked.push({...item,_score:scoreItem(item,words,whole)});
    }
  }
  return ranked.sort((a,b)=>b._score-a._score||a.bac.localeCompare(b.bac)).slice(0,30);
}

function speak(item){
  if(!soundEnabled || !("speechSynthesis" in window))return;
  const key=`${item.bac}-${item.company}-${item.location}`;
  if(key===lastSpoken)return;
  lastSpoken=key;
  speechSynthesis.cancel();
  const msg=new SpeechSynthesisUtterance(`Bac ${item.bac.replace("A","A ")}. ${item.company}. ${item.location}`);
  msg.lang="fr-FR";msg.rate=.92;msg.volume=1;
  speechSynthesis.speak(msg);
  if(navigator.vibrate)navigator.vibrate(80);
}

function isFavorite(item){
  const key=`${item.bac}|${item.company}|${item.location}`;
  return favorites.some(x=>x.key===key);
}

function showHero(item){
  saveHistory(`${item.company} ${item.location}`);
  speak(item);
  return `<div class="hero">
    <div class="hero-bac">${escapeHtml(item.bac)}</div>
    <div class="hero-company">${escapeHtml(item.company)}</div>
    <div class="hero-location">${escapeHtml(item.location)}</div>
    <div class="hero-actions">
      <button class="action" id="favCurrent">${isFavorite(item)?"â Retirer des favoris":"â Ajouter aux favoris"}</button>
      <button class="action" id="repeatSound">ð RÃ©pÃ©ter</button>
      <button class="action" id="clearSearch">â Nouvelle recherche</button>
    </div>
  </div>`;
}

function render(){
  const value=q.value;
  const found=searchItems(value);
  if(!norm(value)){
    results.innerHTML='<div class="empty">Commence Ã  Ã©crire pour trouver le bac.</div>';
    lastSpoken="";
    return;
  }
  if(!found.length){
    results.innerHTML='<div class="empty">Aucun rÃ©sultat.<br><span class="small">Essaie moins de mots ou une autre orthographe.</span></div>';
    return;
  }

  const top=found[0], second=found[1];
  const uniqueBacs=[...new Set(found.map(x=>x.bac))];
  const clearWinner=!second || (top._score-second._score>=220) || uniqueBacs.length===1;

  if(clearWinner){
    results.innerHTML=showHero(top);
    document.getElementById("favCurrent").onclick=()=>toggleFavorite(top);
    document.getElementById("repeatSound").onclick=()=>{lastSpoken="";speak(top)};
    document.getElementById("clearSearch").onclick=()=>{q.value="";render();q.focus()};
    return;
  }

  results.innerHTML=
    `<div class="notice"><b>Plusieurs bacs possibles.</b><br>Ajoute la ville ou lâagence.</div>`+
    found.slice(0,12).map(x=>`<div class="card" data-pick="${escapeHtml(x.company+" "+x.location)}">
      <div class="bac">${escapeHtml(x.bac)}</div>
      <div class="company">${escapeHtml(x.company)}</div>
      <div class="location">${escapeHtml(x.location)}</div>
    </div>`).join("");
  document.querySelectorAll("[data-pick]").forEach(el=>el.onclick=()=>{
    q.value=el.dataset.pick;render();
  });
}

q.addEventListener("input",render);
