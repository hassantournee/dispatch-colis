<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#020503">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dispatch Colis">
<title>Dispatch Colis</title>
<style>
:root{
  --bg:#020503;
  --panel:#080d0a;
  --panel2:#0d1310;
  --text:#ffffff;
  --muted:#9ba39e;
  --green:#35db55;
  --line:#203027;
  --danger:#ff6464;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
body{padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
button,input{font:inherit}
button{cursor:pointer}
.app{max-width:760px;margin:0 auto;min-height:100vh;padding:18px 14px 100px}
.header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand-icon{width:50px;height:50px;color:var(--green);flex:none}
.title{font-size:31px;line-height:1;font-weight:900;white-space:nowrap;letter-spacing:-1px}
.title span{color:var(--green)}
.header-actions{display:flex;gap:9px}
.square-btn{width:52px;height:52px;border:1px solid #222b26;border-radius:16px;
background:#111513;color:#fff;display:grid;place-items:center}
.square-btn.active{background:var(--green);color:#001806;border-color:var(--green)}
.icon{width:27px;height:27px;display:block}
.search-area{position:sticky;top:0;z-index:20;background:linear-gradient(var(--bg) 82%,transparent);
padding:2px 0 18px}
.search-row{display:grid;grid-template-columns:1fr 58px;gap:10px}
.search-box{height:66px;border:1px solid #303a34;border-radius:19px;background:#111513;
display:flex;align-items:center;padding:0 16px;gap:12px}
.search-box:focus-within{border-color:var(--green);box-shadow:0 0 0 2px rgba(53,219,85,.15)}
.search-icon{color:var(--green);width:29px;height:29px;flex:none}
#query{width:100%;border:0;outline:0;background:transparent;color:#fff;font-size:24px;min-width:0}
#query::placeholder{color:#9ca39f}
.clear-btn{border:0;background:transparent;color:#89918d;padding:4px;display:none}
.clear-btn.visible{display:block}
.mic-btn{height:66px;border:0;border-radius:19px;background:var(--green);color:#001a07;
display:grid;place-items:center}
.mic-btn.listening{animation:pulse 1s infinite}
@keyframes pulse{50%{transform:scale(.94);opacity:.72}}
.hint{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
.status{margin:12px 0 0;color:var(--muted);text-align:center;font-size:16px}
.result-panel{margin-top:14px;border:1px solid var(--accent,#35db55);border-radius:24px;
background:radial-gradient(circle at 50% 25%,color-mix(in srgb,var(--accent) 13%,transparent),transparent 48%),#050906;
padding:18px;box-shadow:0 0 24px color-mix(in srgb,var(--accent) 12%,transparent)}
.badge{display:flex;align-items:center;justify-content:center;gap:8px;margin:0 auto 14px;
width:max-content;max-width:100%;border-radius:999px;padding:8px 16px;
background:color-mix(in srgb,var(--accent) 42%,#06200d);font-weight:900;font-size:14px}
.bac-big{text-align:center;font-size:clamp(110px,35vw,210px);line-height:.85;
font-weight:1000;letter-spacing:-10px;color:var(--accent);text-shadow:0 0 28px color-mix(in srgb,var(--accent) 25%,transparent)}
.separator{height:2px;background:var(--accent);border:0;margin:22px 0}
.company-line,.location-line{display:flex;align-items:center;justify-content:center;gap:12px;text-align:center}
.company-line{font-size:27px;font-weight:950;text-transform:uppercase}
.location-line{font-size:21px;font-weight:800;color:var(--accent);margin-top:14px;text-transform:uppercase}
.info-icon{width:31px;height:31px;flex:none}
.result-actions{display:grid;grid-template-columns:1fr 1.45fr 1fr;gap:9px;margin-top:20px}
.action-btn{min-height:68px;border:1px solid #2b332e;border-radius:15px;background:#111513;color:#fff;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-weight:850;font-size:12px}
.action-btn.primary{background:var(--accent);color:#001507;border-color:var(--accent)}
.action-btn.favorite.on{color:#ffc928}
.action-btn .icon{width:27px;height:27px}
.section{margin-top:18px;background:#070b08;border-radius:18px;border:1px solid #101812;padding:13px}
.section.hidden{display:none}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.section-title{font-size:17px;font-weight:950;text-transform:uppercase}
.text-btn{border:0;background:transparent;color:var(--green);font-size:13px;font-weight:900}
.horizontal{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(150px,42%);gap:9px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none}
.horizontal::-webkit-scrollbar{display:none}
.mini-card{min-height:118px;border:1px solid var(--accent);border-radius:14px;
background:linear-gradient(145deg,color-mix(in srgb,var(--accent) 12%,#07100a),#070b08);
padding:12px;color:#fff;text-align:left}
.mini-bac{font-size:28px;font-weight:1000;color:var(--accent)}
.mini-company{font-size:14px;font-weight:850;margin-top:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-location{font-size:13px;color:#c1c7c3;margin-top:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.multi-title{margin:15px 1px 9px;font-weight:900;color:#fff}
.warning{border:1px solid #ffb020;background:#241804;color:#ffd37c;border-radius:14px;padding:12px;margin-top:12px}
.cards{display:grid;gap:10px;margin-top:11px}
.card{border:1px solid var(--accent);border-left-width:7px;border-radius:16px;
background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 9%,#0b100d),#080b09);padding:14px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.card-bac{font-size:44px;line-height:1;font-weight:1000;color:var(--accent)}
.card-company{font-size:19px;font-weight:900;margin-top:7px}
.card-location{font-size:16px;color:#b7beba;margin-top:4px}
.empty{padding:58px 14px;text-align:center;color:var(--muted);font-size:18px}
.bottom-nav{position:fixed;left:0;right:0;bottom:0;background:rgba(5,8,6,.96);
backdrop-filter:blur(14px);border-top:1px solid #151d18;padding:8px 10px calc(8px + var(--safe-bottom));z-index:40}
.nav-inner{max-width:760px;margin:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.nav-btn{border:0;background:transparent;color:#818985;padding:5px 2px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:800}
.nav-btn.active{color:var(--green)}
.nav-btn .icon{width:25px;height:25px}
.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);
background:#151b17;color:#fff;border:1px solid #2b352f;padding:11px 15px;border-radius:999px;
opacity:0;pointer-events:none;transition:.22s;z-index:60;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:390px){
  .title{font-size:27px}.brand-icon{width:44px;height:44px}
  .square-btn{width:46px;height:46px}
  .result-actions{grid-template-columns:1fr 1.25fr 1fr}
  .action-btn{font-size:10px}
}
</style>
</head>

    </div>
    <div id="favoritesList" class="horizontal"></div>
  </section>
</div>

<nav class="bottom-nav">

</nav>

function normalizeText(value){
 return String(value||"")
  .toLowerCase()
  .normalize("NFD")
  .replace(/[\u0300-\u036f]/g,"")
  .replace(/\u0153/g,"oe")
  .replace(/\u00e6/g,"ae")
  .replace(/[^a-z0-9]+/g," ")
  .replace(/\s+/g," ")
  .trim();
}

function escapeHTML(value){
 return String(value).replace(/[&<>"']/g,function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
 });
}

function editDistance(a,b){
 if(a===b)return 0;
 const row=Array.from({length:b.length+1},(_,i)=>i);
 for(let i=1;i<=a.length;i++){
  let left=i,diag=i-1;
  for(let j=1;j<=b.length;j++){
   const up=row[j],cost=a[i-1]===b[j-1]?0:1;
   const value=Math.min(up+1,left+1,diag+cost);
   diag=up;row[j]=value;left=value;
  }
 }
 return row[b.length];
}

function wordSimilarity(word,targetWords){
 if(targetWords.includes(word))return 1;
 if(word.length<3)return 0;
 let best=0;
 for(const target of targetWords){
  if(target.startsWith(word)||word.startsWith(target))best=Math.max(best,.92);
  const similarity=1-editDistance(word,target)/Math.max(word.length,target.length);
  best=Math.max(best,similarity);
 }
 return best;
}

function searchData(value){
 const clean=normalizeText(value);
 if(!clean)return [];
 const words=clean.split(" ").filter(Boolean);
 const results=[];
 DATA.forEach(function(item){
  let minimum=1;
  let score=0;
  words.forEach(function(word){
   const similarity=wordSimilarity(word,item._words);
   minimum=Math.min(minimum,similarity);
   score+=similarity*180;
   const company=normalizeText(item.company);
   const location=normalizeText(item.location);
   if(company.includes(word))score+=120;
   if(location.includes(word))score+=85;
  });
  if(item._search===clean)score+=2000;
  if(normalizeText(item.company)===clean)score+=1100;
  if(item._search.includes(clean))score+=520;
  if(minimum>=.57||item._search.includes(clean)){
   results.push(Object.assign({},item,{_score:score}));
  }
 });
 return results.sort((a,b)=>b._score-a._score||a.bac.localeCompare(b.bac)).slice(0,40);
}

}

function isFavorite(item){return favorites.some(x=>x.key===item._key)}

function toggleFavorite(item){
 if(isFavorite(item)){
  favorites=favorites.filter(x=>x.key!==item._key);
  showToast("Favori retire");
 }else{
  favorites=[{key:item._key,bac:item.bac,company:item.company,location:item.location},...favorites].slice(0,20);
  showToast("Ajoute aux favoris");
 }
 localStorage.setItem("dispatchFavoritesV3",JSON.stringify(favorites));
 renderStoredLists();
 renderSearch();
}

function speak(item,force){
 if(!soundEnabled||!("speechSynthesis" in window))return;
 const key=item._key;
 if(!force&&lastSpoken===key)return;
 lastSpoken=key;
 speechSynthesis.cancel();
 const bacSpoken=item.bac.replace(/^A/,"A ");
 const message=new SpeechSynthesisUtterance("Bac "+bacSpoken+". "+item.company+". "+item.location);
 message.lang="fr-FR";message.rate=.9;message.pitch=1;message.volume=1;
 speechSynthesis.speak(message);
 if(navigator.vibrate)navigator.vibrate(80);
}

 const favorite=isFavorite(item);
 return '<div class="result-panel" style="--accent:'+color+'">'+
  '<div class="badge">RESULTAT UNIQUE</div>'+
  '<div class="bac-big">'+escapeHTML(item.bac)+'</div>'+
  '<hr class="separator">'+
  '<div class="company-line">'+ICONS.building+'<span>'+escapeHTML(item.company)+'</span></div>'+
  '<div class="location-line">'+ICONS.pin+'<span>'+escapeHTML(item.location)+'</span></div>'+
  '<div class="result-actions">'+
   '<button id="listenResult" class="action-btn">'+ICONS.speaker+'<span>ECOUTER</span></button>'+
   '<button id="newSearch" class="action-btn primary">'+ICONS.box+'<span>NOUVELLE RECHERCHE</span></button>'+
   '<button id="favoriteResult" class="action-btn favorite '+(favorite?"on":"")+'">'+
    (favorite?ICONS.starFill:ICONS.star)+'<span>'+(favorite?"FAVORI":"AJOUTER")+'</span></button>'+
  '</div></div>';
}

function cardHTML(item){
 const color=colorFor(item.bac);
 return '<button class="card" data-key="'+escapeHTML(item._key)+'" style="--accent:'+color+';width:100%;text-align:left;color:#fff">'+
  '<div class="card-bac">'+escapeHTML(item.bac)+'</div>'+
  '<div class="card-company">'+escapeHTML(item.company)+'</div>'+
  '<div class="card-location">'+escapeHTML(item.location)+'</div></button>';
}

function renderSearch(){
 const value=query.value;
 clearButton.classList.toggle("visible",value.length>0);
 const results=searchData(value);
 currentItem=null;
 if(!normalizeText(value)){
  mainContent.innerHTML='<div class="empty">Commence a ecrire pour trouver le bon bac.</div>';
  return;
 }
 if(!results.length){
  mainContent.innerHTML='<div class="empty">Aucun resultat.<br><small>Essaie avec moins de mots.</small></div>';
  return;
 }
 const first=results[0];
 const second=results[1];
 const sameBac=results.every(item=>item.bac===first.bac);
 const clearWinner=!second||first._score-second._score>=230||sameBac;
 if(clearWinner){
  currentItem=first;
  mainContent.innerHTML=resultHTML(first);
  addHistory(first);
  speak(first,false);
  document.getElementById("listenResult").onclick=()=>speak(first,true);
  document.getElementById("newSearch").onclick=resetSearch;
  document.getElementById("favoriteResult").onclick=()=>toggleFavorite(first);
 }else{
  const top=results.slice(0,15);
  mainContent.innerHTML='<div class="warning"><b>Plusieurs bacs possibles.</b><br>Ajoute la ville ou selectionne le bon resultat.</div>'+
   '<div class="cards">'+top.map(cardHTML).join("")+'</div>';
  mainContent.querySelectorAll("[data-key]").forEach(function(button){
   button.onclick=function(){
    const item=DATA.find(x=>x._key===button.dataset.key);
    query.value=item.company+" "+item.location;
    renderSearch();
    window.scrollTo({top:0,behavior:"smooth"});
   };
  });
 }
}

function resetSearch(){
 query.value="";
 lastSpoken="";
 renderSearch();
 query.focus();
 window.scrollTo({top:0,behavior:"smooth"});
}

function storedCard(item){
 const color=colorFor(item.bac);
 return '<button class="mini-card" data-key="'+escapeHTML(item.key)+'" style="--accent:'+color+'">'+
  '<div class="mini-bac">'+escapeHTML(item.bac)+'</div>'+
  '<div class="mini-company">'+escapeHTML(item.company)+'</div>'+
  '<div class="mini-location">'+escapeHTML(item.location)+'</div></button>';
}

function renderStoredLists(){
 historySection.classList.toggle("hidden",history.length===0);
 favoritesSection.classList.toggle("hidden",favorites.length===0);
 historyList.innerHTML=history.map(storedCard).join("");
 favoritesList.innerHTML=favorites.map(storedCard).join("");
 document.querySelectorAll(".mini-card").forEach(function(button){
  button.onclick=function(){
   const item=DATA.find(x=>x._key===button.dataset.key);
   if(item){query.value=item.company+" "+item.location;renderSearch();window.scrollTo({top:0,behavior:"smooth"});}
  };
 });
}

query.addEventListener("input",renderSearch);
query.addEventListener("search",renderSearch);
clearButton.onclick=resetSearch;

soundButton.onclick=function(){
 soundEnabled=!soundEnabled;
 localStorage.setItem("dispatchSound",soundEnabled?"1":"0");
 setIcon(soundButton,soundEnabled?"speaker":"mute");
 soundButton.classList.toggle("active",soundEnabled);
 if(!soundEnabled&&"speechSynthesis" in window)speechSynthesis.cancel();
};
setIcon(soundButton,soundEnabled?"speaker":"mute");
soundButton.classList.toggle("active",soundEnabled);

document.getElementById("nightButton").onclick=function(){
 showToast("Mode nuit deja active");
};

document.getElementById("clearHistory").onclick=function(){
 history=[];localStorage.setItem("dispatchHistoryV3","[]");renderStoredLists();showToast("Historique efface");
};
document.getElementById("clearFavorites").onclick=function(){
 if(confirm("Supprimer tous les favoris ?")){
  favorites=[];localStorage.setItem("dispatchFavoritesV3","[]");renderStoredLists();renderSearch();
 }
};

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SpeechRecognition){
 const recognition=new SpeechRecognition();
 recognition.lang="fr-FR";recognition.interimResults=false;recognition.maxAlternatives=1;
 micButton.onclick=function(){micButton.classList.add("listening");recognition.start()};
 recognition.onresult=function(event){query.value=event.results[0][0].transcript;renderSearch()};
 recognition.onerror=function(){showToast("Voix non comprise")};
 recognition.onend=function(){micButton.classList.remove("listening")};
}else{
 micButton.onclick=function(){showToast("Microphone indisponible dans Safari")};
}

document.querySelectorAll(".nav-btn").forEach(function(button){
 button.onclick=function(){
  document.querySelectorAll(".nav-btn").forEach(x=>x.classList.remove("active"));
  button.classList.add("active");
  const target=button.dataset.target;
  if(target==="search"){window.scrollTo({top:0,behavior:"smooth"});query.focus();}
  if(target==="history"){historySection.scrollIntoView({behavior:"smooth",block:"start"});}
  if(target==="favorites"){favoritesSection.scrollIntoView({behavior:"smooth",block:"start"});}
  if(target==="help"){alert("Tape le nom de l entreprise. Ajoute la ville si plusieurs bacs apparaissent. La recherche accepte les accents et les petites fautes.");}
 };
});

renderStoredLists();
renderSearch();
</script>
</body>
</html>
